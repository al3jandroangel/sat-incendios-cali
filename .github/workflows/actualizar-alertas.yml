# Actualiza las alertas todos los días y publica el geoportal en GitHub Pages.
# Requisitos en el repositorio:
#   - Settings -> Pages -> Source: "GitHub Actions"
#   - (Opcional) Secret FIRMS_MAP_KEY para mostrar puntos calientes NASA FIRMS
name: Actualizar alertas SAT

# Los crons de GitHub en el minuto :00 se retrasan u omiten con frecuencia
# (franja de máxima carga). Por eso: minutos "impares" que llegan ANTES de la
# hora objetivo (6:00 am y 12:00 m de Colombia = UTC-5) y un respaldo ~30 min
# después por si GitHub omite el primero. El workflow es idempotente.
on:
  schedule:
    - cron: "43 10 * * *"  # 05:43 Colombia -> portal listo hacia las 6:00 am
    - cron: "13 11 * * *"  # 06:13 Colombia (respaldo mañana)
    - cron: "43 16 * * *"  # 11:43 Colombia -> listo hacia las 12:00 m
    - cron: "13 17 * * *"  # 12:13 Colombia (respaldo mediodía; viento vespertino)
  workflow_dispatch:

concurrency:
  group: sat-actualizacion
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pandas numpy pyproj joblib "scikit-learn==1.6.1" pyarrow Pillow
      - name: Generar alertas del día
        env:
          FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}
        run: python scripts/05_predict_daily.py
      - name: Guardar históricos (estaciones y mapas PNG) en el repositorio
        run: |
          git config user.name "sat-bot"
          git config user.email "actions@github.com"
          git pull --rebase || true
          git add -A data/stations_history.csv data/model_at_stations.csv historico || true
          git diff --cached --quiet || git commit -m "Históricos $(date -u +%F_%H%M)"
          git push || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - uses: actions/deploy-pages@v4
