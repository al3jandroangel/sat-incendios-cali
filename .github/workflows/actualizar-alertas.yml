# Actualiza las alertas todos los días y publica el geoportal en GitHub Pages.
# Requisitos en el repositorio:
#   - Settings -> Pages -> Source: "GitHub Actions"
#   - (Opcional) Secret FIRMS_MAP_KEY para mostrar puntos calientes NASA FIRMS
name: Actualizar alertas SAT

# Los crons de GitHub en el minuto :00 se retrasan u omiten con frecuencia
# (franja de máxima carga). Por eso: minutos "impares" que llegan ANTES de la
# hora objetivo (6:00 am y 12:00 m de Colombia = UTC-5) y un respaldo ~30 min
# después por si GitHub omite el primero. El workflow es idempotente.
on:
  schedule:
    # cada 6 horas: listo hacia las 00:00, 06:00, 12:00 y 18:00 de Colombia
    - cron: "43 4,10,16,22 * * *"  # principal: 23:43/05:43/11:43/17:43 COT
    - cron: "13 5,11,17,23 * * *"  # respaldo:  00:13/06:13/12:13/18:13 COT
  workflow_dispatch:
  repository_dispatch:
    types: [actualizar]   # Plan B: disparo externo por API (tarea local)

concurrency:
  group: sat-actualizacion
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pandas numpy pyproj joblib "scikit-learn==1.6.1" pyarrow Pillow
      - name: Generar alertas del día
        env:
          FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}
        run: python scripts/05_predict_daily.py
      - name: Guardar históricos (estaciones y mapas PNG) en el repositorio
        run: |
          # identidad oficial del bot de Actions: el correo actions@github.com
          # atribuiría los commits a la cuenta ajena "actions-user"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase || true
          git add -A data/stations_history.csv data/model_at_stations.csv data/hotspots_recientes.csv historico || true
          git diff --cached --quiet || git commit -m "Históricos $(date -u +%F_%H%M)"
          git push || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - uses: actions/deploy-pages@v4
